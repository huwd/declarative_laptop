# Tier 5: weekly automated dependency update
# Runs nix flake update every Monday at 09:00 UTC.
# If flake.lock changed, opens a PR with the build result,
# vulnix findings, and nvd package diff in the body.
# Acts as Dependabot for the full OS closure.

name: Update

on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Check if flake.lock changed
        id: changed
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated closure
        id: build
        if: steps.changed.outputs.changed == 'true'
        run: |
          CLOSURE=$(nix build \
            .#nixosConfigurations.framework-13.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "closure=$CLOSURE" >> "$GITHUB_OUTPUT"

      - name: Restore previous closure for diff
        id: cache
        if: steps.changed.outputs.changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .main-closure
          key: main-closure-latest

      - name: Generate nvd diff
        id: nvd
        if: steps.changed.outputs.changed == 'true' && steps.cache.outputs.cache-hit == 'true'
        run: |
          PREV=$(cat .main-closure)
          CURR=${{ steps.build.outputs.closure }}
          DIFF=$(nix run nixpkgs#nvd -- diff "$PREV" "$CURR" 2>&1)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run vulnix scan
        id: vulnix
        if: steps.changed.outputs.changed == 'true'
        run: |
          REPORT=$(nix run nixpkgs#vulnix -- --closure ${{ steps.build.outputs.closure }} 2>&1 || true)
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/nixpkgs-update
          delete-branch: true
          commit-message: "chore: update nixpkgs ${{ github.run_id }}"
          title: "chore: weekly nixpkgs update"
          body: |
            Automated weekly `nix flake update`.

            ## 📦 Package changes

            ```
            ${{ steps.nvd.outputs.diff || 'nvd diff unavailable (no previous build cached)' }}
            ```

            ## 🔒 CVE findings (vulnix)

            ```
            ${{ steps.vulnix.outputs.report || 'No findings.' }}
            ```

            > New CVE findings block merge until triaged. Add accepted risks to `vulnix.toml`.
