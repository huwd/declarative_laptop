name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build system closure (${{ matrix.host }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      matrix:
        host: [framework-13, dell-xps-13-9343]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f  # main
      - uses: DeterminateSystems/magic-nix-cache-action@659e09b432ddb0b3d78bba7540ef6593c6cb181b  # main

      - name: Build NixOS closure
        id: build
        run: |
          CLOSURE=$(nix build \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "closure=$CLOSURE" >> "$GITHUB_OUTPUT"

      - name: Run vulnix against closure
        id: vulnix
        run: |
          nix run nixpkgs#vulnix -- --closure ${{ steps.build.outputs.closure }} > vulnix-report.txt 2>/dev/null || true

      - name: Post vulnix findings as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          VULNIX_REPORT_PATH: vulnix-report.txt
          HOST: ${{ matrix.host }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.VULNIX_REPORT_PATH, 'utf8').trim();
            if (!report) return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 vulnix CVE scan (${process.env.HOST})\n\`\`\`\n${report}\n\`\`\``,
            });

      - name: Restore last main closure path
        id: cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .main-closure
          key: main-closure-${{ matrix.host }}

      - name: Generate nvd diff
        if: github.event_name == 'pull_request' && steps.cache.outputs.cache-hit == 'true'
        run: |
          PREV=$(cat .main-closure)
          CURR=${{ steps.build.outputs.closure }}
          nix run nixpkgs#nvd -- diff "$PREV" "$CURR" > nvd-diff.txt 2>/dev/null || true

      - name: Post diff as PR comment
        if: github.event_name == 'pull_request' && steps.cache.outputs.cache-hit == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          HOST: ${{ matrix.host }}
        with:
          script: |
            const fs = require('fs');
            const host = process.env.HOST;
            const diff = fs.existsSync('nvd-diff.txt')
              ? fs.readFileSync('nvd-diff.txt', 'utf8').trim()
              : '';
            const body = diff
              ? `## 📦 Package diff (${host})\n\`\`\`\n${diff}\n\`\`\``
              : `## 📦 Package diff (${host})\nNo package changes.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.startsWith(`## 📦 Package diff (${host})`));
            if (existing) {
              github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Cache closure path (main only)
        if: github.ref == 'refs/heads/main'
        run: echo "${{ steps.build.outputs.closure }}" > .main-closure

      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        if: github.ref == 'refs/heads/main'
        with:
          path: .main-closure
          key: main-closure-${{ matrix.host }}
