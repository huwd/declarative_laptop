name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build system closure
    runs-on: ubuntu-latest
    outputs:
      closure: ${{ steps.build.outputs.closure }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f  # main
      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7  # main

      - name: Build NixOS closure
        id: build
        run: |
          CLOSURE=$(nix build \
            .#nixosConfigurations.framework-13.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "closure=$CLOSURE" >> "$GITHUB_OUTPUT"

      - name: Cache closure path (main only)
        if: github.ref == 'refs/heads/main'
        run: echo "${{ steps.build.outputs.closure }}" > .main-closure

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        if: github.ref == 'refs/heads/main'
        with:
          path: .main-closure
          key: main-closure-latest

  scan:
    name: CVE scan (vulnix)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f  # main
      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7  # main

      - name: Run vulnix against closure
        id: vulnix
        run: |
          nix run nixpkgs#vulnix -- --closure ${{ needs.build.outputs.closure }} > vulnix-report.txt 2>&1 || true

      - name: Post vulnix findings as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          VULNIX_REPORT_PATH: vulnix-report.txt
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.VULNIX_REPORT_PATH, 'utf8').trim();
            if (!report) return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 vulnix CVE scan\n\`\`\`\n${report}\n\`\`\``,
            });

  diff:
    name: Package diff (nvd)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f  # main
      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7  # main

      - name: Restore last main closure path
        id: cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .main-closure
          key: main-closure-latest

      - name: Generate nvd diff
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          PREV=$(cat .main-closure)
          CURR=${{ needs.build.outputs.closure }}
          nix run nixpkgs#nvd -- diff "$PREV" "$CURR" > nvd-diff.txt 2>&1 || true

      - name: Post diff as PR comment
        if: steps.cache.outputs.cache-hit == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.existsSync('nvd-diff.txt')
              ? fs.readFileSync('nvd-diff.txt', 'utf8').trim()
              : '';
            const body = diff
              ? `## 📦 Package diff (nvd)\n\`\`\`\n${diff}\n\`\`\``
              : `## 📦 Package diff (nvd)\nNo package changes.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.startsWith('## 📦 Package diff'));
            if (existing) {
              github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
